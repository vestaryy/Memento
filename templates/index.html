<!DOCTYPE html>
<html>
<head>
    <title>Мой Архив</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h1>Мои воспоминания</h1>
    <a href="/add_memory" class="btn btn-primary mb-4">Добавить запись</a>
    
    <div class="row">
        {% for item in memories %}
        <div class="col-md-4 mb-3">
            <div class="card">
                <img src="{{ item.temp_url }}" class="card-img-top" alt="Воспоминание">
                <div class="card-body">
                    <p class="card-text">{{ item.description }}</p>
                    <small class="text-muted">{{ item.created_date.strftime('%d.%m.%Y') }}</small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
